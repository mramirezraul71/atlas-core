name: Code Quant tests

on:
  push:
    branches: [intent-input-rename, main]
  pull_request:
    branches: [intent-input-rename, main]

jobs:
  pytest-atlas-code-quant:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            atlas_code_quant/requirements.txt
            atlas_code_quant/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r atlas_code_quant/requirements.txt -r atlas_code_quant/requirements-dev.txt

      - name: Pytest atlas_code_quant
        run: python -m pytest tests/atlas_code_quant/ -q --tb=short
