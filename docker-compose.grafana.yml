# ATLAS-Quant — Stack de monitoreo: Prometheus + Grafana
# Uso:
#   docker compose -f docker-compose.grafana.yml up -d
#
# Acceso:
#   Grafana    → http://localhost:3002  (admin / atlas2026)
#   Prometheus → http://localhost:9092  (UI scraper)
#   Métricas   → http://localhost:9090/metrics (expuesto por atlas_quant_core)
#
# Puertos 3000 (RAULI-VISION) y 3001 ya ocupados en este host.

version: '3.8'

services:

  # ── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: atlas-prometheus
    restart: unless-stopped
    ports:
      - "9092:9090"           # 9092 en host (9090 lo usa el core Python, 3000/3001 ocupados)
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - atlas-monitor

  # ── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: atlas-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=atlas2026
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/atlas_pro_2026.json
      - GF_SERVER_ROOT_URL=http://localhost:3002
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - atlas-monitor

volumes:
  prometheus_data:
  grafana_data:

networks:
  atlas-monitor:
    driver: bridge
