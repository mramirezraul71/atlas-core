<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Code-Quant</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script>
    const target = `/quant-ui${location.search || ''}${location.hash || ''}`;
    location.replace(target);
  </script>
</head>
<body style="margin:0;background:#0f1117;color:#d7dde8;font:14px/1.5 'Segoe UI',sans-serif;display:grid;place-items:center;min-height:100vh">
  <div style="max-width:520px;padding:24px;text-align:center">
    <h1 style="margin:0 0 12px;font-size:20px">Redirigiendo al dashboard canónico de Atlas Code-Quant</h1>
    <p style="margin:0 0 16px;color:#97a3b6">
      Esta ruta quedó solo por compatibilidad para evitar seguir usando una copia desactualizada del dashboard.
    </p>
    <p style="margin:0">
      Si no redirige automáticamente, abre
      <a href="/quant-ui" style="color:#00d4aa">/quant-ui</a>.
    </p>
  </div>
</body>
</html>
