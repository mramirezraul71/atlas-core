<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ATLAS Hub - Central UI</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; margin: 0; padding: 1.5rem; }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1rem; max-width: 52rem; box-shadow: 0 12px 32px rgba(0,0,0,.18); }
    .card h2 { margin: 0; font-size: 1rem; color: #58a6ff; }
    .row { margin: 0.35rem 0; font-size: 0.9rem; }
    .muted { color: #8b949e; }
    a { color: #58a6ff; }
    #options-engine-root .err { color: #f85149; }
    .options-head { display: flex; align-items: center; justify-content: space-between; gap: .75rem; margin-bottom: .6rem; flex-wrap: wrap; }
    .badge { display: inline-flex; align-items: center; gap: .4rem; font-size: .78rem; font-weight: 700; padding: .35rem .65rem; border-radius: 999px; letter-spacing: .02em; text-transform: uppercase; }
    .badge.go { background: rgba(46,160,67,.16); color: #7ee787; border: 1px solid rgba(46,160,67,.35); }
    .badge.no-go { background: rgba(248,81,73,.16); color: #ff7b72; border: 1px solid rgba(248,81,73,.35); }
    .badge.degraded { background: rgba(210,153,34,.16); color: #e3b341; border: 1px solid rgba(210,153,34,.35); }
    .subline { font-size: .9rem; color: #8b949e; margin-bottom: .85rem; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: .6rem; margin-bottom: .85rem; }
    .stat { background: #0f141b; border: 1px solid #27303a; border-radius: 10px; padding: .65rem .75rem; min-height: 62px; }
    .stat-label { color: #8b949e; font-size: .76rem; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .25rem; }
    .stat-value { color: #e6edf3; font-size: 1rem; font-weight: 700; }
    .note { margin: .8rem 0; padding: .65rem .8rem; border-radius: 10px; font-size: .9rem; border: 1px solid #30363d; background: #0f141b; color: #c9d1d9; }
    .note.warn { border-color: rgba(210,153,34,.4); background: rgba(210,153,34,.08); color: #f2cc60; }
    .links { display: flex; flex-wrap: wrap; gap: .55rem; margin-top: .85rem; }
    .link-btn { display: inline-flex; align-items: center; justify-content: center; padding: .48rem .72rem; border-radius: 8px; border: 1px solid #30363d; background: #0f141b; color: #58a6ff; text-decoration: none; font-size: .84rem; }
    .link-btn:hover { border-color: #58a6ff; background: #111a24; }
  </style>
</head>
<body>
  <h1>ATLAS - UI central (8791)</h1>
  <p class="muted">Vista minima funcional. El hub completo puede coexistir con <code>dashboard.html.backup</code>.</p>

  <div class="card" id="options-engine-root">
    <div id="options-engine-body" class="muted">Cargando estado...</div>
  </div>

  <script>
    (function () {
      var el = document.getElementById("options-engine-body");

      function esc(v) {
        return String(v == null ? "" : v)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function valueOrPending(v, formatter) {
        if (v == null || v === "" || Number.isNaN(v)) return "pending";
        return formatter ? formatter(v) : String(v);
      }

      function statusClass(status) {
        if (status === "GO") return "go";
        if (status === "NO_GO" || status === "NO-GO") return "no-go";
        return "degraded";
      }

      function deriveGrafanaUrl(seed, uid, slug) {
        if (!seed || seed === "#") return "#";
        try {
          var u = new URL(seed, window.location.origin);
          return u.origin + "/d/" + uid + "/" + slug;
        } catch (e) {
          return "#";
        }
      }

      fetch("/api/options-engine-status")
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (!d.ok) {
            el.className = "err";
            el.textContent = "Error: " + (d.error || "unknown");
            return;
          }

          var status = d.status || d.go_nogo_label || "DEGRADED";
          var automationMode = d.automation_mode || "pending";
          var loopMode = d.loop_mode || "metrics unavailable";
          var closedToday = d.paper_trades_closed_today != null ? d.paper_trades_closed_today : (d.trades_closed_today != null ? d.trades_closed_today : 0);
          var completedTotal = d.trades_completed_total != null ? d.trades_completed_total : closedToday;
          var target = d.paper_trades_target != null ? d.paper_trades_target : null;
          var stale = d.journal_last_write_age_seconds != null && Number(d.journal_last_write_age_seconds) > 300;
          var noteText = d.notes || "sin datos aun";
          if (stale && noteText.toLowerCase().indexOf("journal stale") === -1) {
            noteText += " · Journal stale";
          }

          var stats = [
            { label: "IV Rank", value: valueOrPending(d.iv_rank_current, function (v) { return Number(v).toFixed(2); }) },
            { label: "Journal hoy", value: valueOrPending(d.journal_events_today, function (v) { return parseInt(v, 10); }) },
            { label: "Sesiones", value: valueOrPending(d.journal_sessions_today, function (v) { return parseInt(v, 10); }) },
            { label: "Cerrados hoy", value: valueOrPending(closedToday, function (v) { return parseInt(v, 10); }) },
            { label: "Meta", value: target != null ? (completedTotal + "/" + target) : String(completedTotal) },
            {
              label: "WR / PF",
              value: (d.wr_basic != null || d.pf_basic != null)
                ? ("WR " + valueOrPending(d.wr_basic, function (v) { return Number(v).toFixed(2); }) + " · PF " + valueOrPending(d.pf_basic, function (v) { return Number(v).toFixed(2); }))
                : "pending"
            }
          ];

          var statsHtml = stats.map(function (item) {
            return "<div class=\"stat\"><div class=\"stat-label\">" + esc(item.label) + "</div><div class=\"stat-value\">" + esc(item.value) + "</div></div>";
          }).join("");

          var healthUrl = d.grafana_health_dashboard_url || "#";
          var signalsUrl = d.grafana_signals_dashboard_url || deriveGrafanaUrl(healthUrl, "atlas-options-signals-intent", "options-engine-signals-intent");
          var perfUrl = d.grafana_paper_performance_dashboard_url || deriveGrafanaUrl(healthUrl, "atlas-options-paper-performance", "options-engine-paper-performance");
          var optionsUiUrl = d.options_ui_url || "/quant-ui";

          el.className = "";
          el.innerHTML =
            "<div class=\"options-head\">" +
              "<h2>OPTIONS ENGINE [paper only]</h2>" +
              "<span class=\"badge " + statusClass(status) + "\">" + esc(String(status).replace(/_/g, "-")) + "</span>" +
            "</div>" +
            "<div class=\"subline\">" + esc(automationMode) + " · " + esc(loopMode) + "</div>" +
            "<div class=\"stats\">" + statsHtml + "</div>" +
            "<div class=\"note" + (stale ? " warn" : "") + "\">" + esc(noteText) + "</div>" +
            "<div class=\"links\">" +
              "<a class=\"link-btn\" href=\"" + esc(healthUrl) + "\" target=\"_blank\" rel=\"noopener\">Grafana Health</a>" +
              "<a class=\"link-btn\" href=\"" + esc(signalsUrl) + "\" target=\"_blank\" rel=\"noopener\">Grafana Signals</a>" +
              "<a class=\"link-btn\" href=\"" + esc(perfUrl) + "\" target=\"_blank\" rel=\"noopener\">Grafana Performance</a>" +
              "<a class=\"link-btn\" href=\"" + esc(optionsUiUrl) + "\" target=\"_blank\" rel=\"noopener\">Options UI</a>" +
            "</div>" +
            "<div class=\"row muted\" style=\"margin-top:.8rem;\">Actualizado (UTC): " + esc(d.last_updated_utc || "pending") + "</div>";
        })
        .catch(function (e) {
          el.className = "err";
          el.textContent = "Fallo de red: " + e;
        });
    })();
  </script>
</body>
</html>
