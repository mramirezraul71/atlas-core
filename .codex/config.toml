# ATLAS_PUSH project config (MAX CAPACITY default)
# Global and project configs are kept aligned to avoid precedence conflicts.

model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
model_verbosity = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
show_raw_agent_reasoning = false
# (NUEVO) Mantener simetría de trazas; no altera tu comportamiento si tu build lo ignora.
show_raw_agent_messages = false

[windows]
sandbox = "elevated"

[features]
shell_tool = true
shell_snapshot = true
unified_exec = true
apply_patch_freeform = true
multi_agent = true
collaboration_modes = true
runtime_metrics = true
remote_models = true
search_tool = true

# ============================================================
# PERFILES (NO se elimina nada: se mantienen tus perfiles y se añaden nuevos)
# ============================================================

[profiles.atlas_supervisor]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
model_verbosity = "high"
