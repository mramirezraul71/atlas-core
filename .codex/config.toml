web_search = "live"
show_raw_agent_reasoning = true

[profiles.atlas_safe]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"
show_raw_agent_reasoning = false

[profiles.atlas_realtime]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
model_verbosity = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
show_raw_agent_reasoning = false

# (NUEVO) Perfiles estilo "Cursor" y Supervisor profundo adicional
[profiles.cursor_soft]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
model_verbosity = "high"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
show_raw_agent_reasoning = false
show_raw_agent_messages = false

[profiles.cursor_dev]
