apiVersion: 1
policies:
  - orgId: 1
    receiver: grafana-default-email
    group_by: ['alertname', 'component', 'severity']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: atlas-telegram
        object_matchers:
          - ['component', '=', 'atlas_scorecard']
        group_by: ['alertname', 'severity']
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 2h
      - receiver: atlas-telegram
        object_matchers:
          - ['component', '=', 'atlas_memory']
        group_by: ['alertname', 'severity']
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 2h
      - receiver: atlas-telegram
        object_matchers:
          - ['component', '=', 'atlas_journal']
        group_by: ['alertname', 'severity']
        group_wait: 10s
        group_interval: 2m
        repeat_interval: 2h
