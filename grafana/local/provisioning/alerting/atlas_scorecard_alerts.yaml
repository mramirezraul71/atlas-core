apiVersion: 1
groups:
  - orgId: 1
    name: atlas_operational_discipline
    folder: ATLAS Alerts
    interval: 30s
    rules:
      - uid: atlas_usefulness_low
        title: ATLAS Implementation Usefulness Low
        condition: B
        data:
          - refId: A
            datasourceUid: atlas-prom
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: atlas-prom
              editorMode: code
              expr: atlas_implementation_usefulness_score
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: '__expr__'
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 40
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '__expr__'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: atlas-quant-pro-2026
        panelId: 26
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: ATLAS implementation usefulness score below 40.
          description: The current implementation still lacks enough live-paper evidence to claim operational usefulness.
        labels:
          component: atlas_scorecard
          severity: warning
      - uid: atlas_brain_delivery_low
        title: ATLAS Brain Delivery Ratio Low
        condition: B
        data:
          - refId: A
            datasourceUid: atlas-prom
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: atlas-prom
              editorMode: code
              expr: atlas_brain_delivery_ratio_pct
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: '__expr__'
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 80
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '__expr__'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: atlas-quant-pro-2026
        panelId: 27
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: ATLAS brain delivery ratio below 80%.
          description: Memory and bitacora are not absorbing enough of the operational learning flow.
        labels:
          component: atlas_memory
          severity: warning
      - uid: atlas_untracked_open_gt_zero
        title: ATLAS Untracked Open Positions Present
        condition: B
        data:
          - refId: A
            datasourceUid: atlas-prom
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: atlas-prom
              editorMode: code
              expr: atlas_open_untracked_ratio_pct
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: '__expr__'
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '__expr__'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: atlas-quant-pro-2026
        panelId: 28
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: ATLAS still has open positions without strategy attribution.
          description: Open positions should not remain in untracked once the trading process hardening is active.
        labels:
          component: atlas_journal
          severity: critical
      - uid: atlas_recent_unattributed_entries_gt_zero
        title: ATLAS Recent Unattributed Entries Present
        condition: B
        data:
          - refId: A
            datasourceUid: atlas-prom
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: atlas-prom
              editorMode: code
              expr: atlas_recent_unattributed_entries_count
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            datasourceUid: '__expr__'
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '__expr__'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        dashboardUid: atlas-quant-pro-2026
        panelId: 30
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: ATLAS has recent journal entries without valid strategy attribution.
          description: New entries should not be born with unknown or untracked strategy_type once attribution hardening is active.
        labels:
          component: atlas_journal
          severity: critical
